<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ayurvedic Diet System - Login</title>

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f0f8f5;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: #ffffff;
      padding: 40px 50px;
      border-radius: 15px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      width: 350px;
      text-align: center;
    }

    h1 {
      color: #2e7d32;
      margin-bottom: 25px;
    }

    label {
      display: block;
      text-align: left;
      margin-top: 15px;
      font-weight: 500;
      color: #333;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      background-color: #595959;
      color: #ffffff;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 25px;
    }

    button:hover {
      background-color: #45a049;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>WELCOME TO AYURVEDIC DIET AND WELLNESS MANAGEMENT SYSTEM</h1>
    <form action="patient.html" method="get">
      <label for="name">Patient Name:</label>
      <input type="text" id="name" placeholder="Enter full name" required>

      <label for="age">Age:</label>
      <input type="number" id="age" placeholder="Enter age" required>

      <label for="mobile">Mobile Number:</label>
      <input type="tel" id="mobile" placeholder="Enter mobile number" required>

      <label for="gender">Gender:</label>
      <select id="gender" required>
        <option value="">Select gender</option>
        <option>Male</option>
        <option>Female</option>
        <option>Other</option>
      </select>

      <button type="submit"><a href="\page2.html" >NEXT</a></button>
    </form>
  </div>

</body>
</html>
